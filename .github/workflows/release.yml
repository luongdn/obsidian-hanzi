name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build with dictionary URL
        env:
          DICT_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cedict_ts.u8
        run: npm run build

      - name: Package zip for manual install
        run: |
          mkdir -p obsidian-hanzi/assets
          cp main.js manifest.json styles.css obsidian-hanzi/
          cp assets/cedict_ts.u8 obsidian-hanzi/assets/
          zip -r obsidian-hanzi-${{ github.ref_name }}.zip obsidian-hanzi

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            assets/cedict_ts.u8
            obsidian-hanzi-${{ github.ref_name }}.zip
